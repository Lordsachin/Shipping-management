<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Shipping Systems</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .hero-section { background: linear-gradient(135deg, #1abc9c 0%, #16a085 100%); color: white; padding: 40px 0; margin-bottom: 30px; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .result-box { display: none; margin-top: 20px; border-radius: 8px; padding: 15px; }
        .navbar { background-color: #2c3e50 !important; }
        .menu-card {
            background: #f1f3f5;
            border-radius: 12px;
            padding: 12px;
            box-shadow: inset 0 0 0 1px #e3e6ea;
        }
        .menu-item {
            width: 100%;
            border: none;
            background: transparent;
            text-align: left;
            padding: 14px 12px;
            border-radius: 10px;
            color: #334155;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 8px;
            transition: all 0.2s ease;
        }
        .menu-item:hover {
            background: #e8f8f4;
            color: #0f766e;
        }
        .menu-item.active {
            background: #d7f3eb;
            color: #0f766e;
        }
        .panel-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
        }
        .panel-title {
            border-bottom: 1px solid #edf2f7;
            padding-bottom: 12px;
            margin-bottom: 20px;
            color: #0f172a;
        }
        @media (max-width: 767.98px) {
            .menu-item {
                margin-bottom: 6px;
            }
        }
    </style>
</head>
<body>

    <!-- NAVBAR WITH USER INFO -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-shipping-fast"></i> Shipping</a>
            <div class="d-flex align-items-center">
                <span class="text-white me-3">Welcome, <strong>{{ username }}</strong></span>
                <a href="/logout" class="btn btn-outline-light btn-sm">Logout <i class="fas fa-sign-out-alt"></i></a>
            </div>
        </div>
    </nav>

    <!-- HERO HEADER -->
    <div class="hero-section text-center">
        <div class="container">
            <h1><i class="fas fa-globe-americas"></i> Logistics Dashboard</h1>
            <p class="lead">Manage orders, calculate costs, and track shipments in real-time.</p>
        </div>
    </div>

    <div class="container">
        <div class="row g-4">
            <div class="col-lg-4 col-xl-3">
                <div class="menu-card">
                    <button class="menu-item active" id="menuPlace" onclick="showPanel('place')">
                        <i class="fas fa-box me-2"></i> Place New Shipment
                    </button>
                    <button class="menu-item" id="menuTrack" onclick="showPanel('track')">
                        <i class="fas fa-search-location me-2"></i> Track Shipment
                    </button>
                </div>
            </div>

            <div class="col-lg-8 col-xl-9">
                <div id="placePanel" class="panel-card p-4">
                    <h5 class="panel-title"><i class="fas fa-box me-2 text-primary"></i>Place New Shipment</h5>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Customer Name</label>
                            <input type="text" id="name" class="form-control" placeholder="John Doe">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Distance (km)</label>
                            <input type="number" id="distance" class="form-control" placeholder="e.g. 150">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Delivery Address</label>
                            <input type="text" id="address" class="form-control" placeholder="123 Main St">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Shipping Method</label>
                            <select id="method" class="form-select">
                                <option value="1">Sea Freight (Slow - 2.3₹ per tonne-km)</option>
                                <option value="2">Road Transport (Medium - 3.8₹ per tonne-km)</option>
                                <option value="3">Air Cargo (Fast - 72₹ per tonne-km)</option>
                                <option value="4">Rail Freight (Medium - 2₹ per tonne-km)</option>
                            </select>
                        </div>
                        <div class="col-12 mt-4">
                            <button class="btn btn-primary w-100" onclick="placeOrder()" id="orderBtn">
                                Calculate Cost and Confirm Order
                            </button>
                        </div>
                    </div>
                    <div id="orderResult" class="result-box alert alert-success"></div>
                </div>

                <div id="trackPanel" class="panel-card p-4 d-none">
                    <h5 class="panel-title"><i class="fas fa-search-location me-2 text-success"></i>Track Shipment</h5>
                    <p class="text-muted">Enter your unique Tracking ID.</p>
                    <input type="text" id="trackInput" class="form-control mb-3" placeholder="TRK-XXXXX">
                    <button class="btn btn-success w-100" onclick="trackOrder()" id="trackBtn">Check Status</button>
                    <div id="trackResult" class="result-box"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showPanel(panel) {
            const placePanel = document.getElementById('placePanel');
            const trackPanel = document.getElementById('trackPanel');
            const menuPlace = document.getElementById('menuPlace');
            const menuTrack = document.getElementById('menuTrack');

            if (panel === 'place') {
                placePanel.classList.remove('d-none');
                trackPanel.classList.add('d-none');
                menuPlace.classList.add('active');
                menuTrack.classList.remove('active');
            } else {
                trackPanel.classList.remove('d-none');
                placePanel.classList.add('d-none');
                menuTrack.classList.add('active');
                menuPlace.classList.remove('active');
            }
        }

        function placeOrder() {
            const name = document.getElementById('name').value;
            const address = document.getElementById('address').value;
            const distance = document.getElementById('distance').value;
            const method = document.getElementById('method').value;
            const resultBox = document.getElementById('orderResult');

            if(!name || !address || !distance) { alert("Please fill all fields!"); return; }

            fetch('/place_order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, address, distance, method_id: method })
            })
            .then(res => res.json())
            .then(data => {
                resultBox.style.display = 'block';
                if(data.status === 'success') {
                    resultBox.className = "result-box alert alert-success";
                    resultBox.innerHTML = `<h4>Order Confirmed!</h4><p>Tracking ID: <strong>${data.tracking_id}</strong></p><p>Cost: Rs ${data.cost.toFixed(2)}</p>`;
                } else {
                    resultBox.className = "result-box alert alert-danger";
                    resultBox.innerHTML = "Error: " + data.message;
                }
            })
            .catch(error => {
                resultBox.style.display = 'block';
                resultBox.className = "result-box alert alert-danger";
                resultBox.innerHTML = "Error: " + error.message;
                console.error('Place Order Error:', error);
            });
        }

        function trackOrder() {
            const id = document.getElementById('trackInput').value;
            const box = document.getElementById('trackResult');
            
            fetch('/track_shipment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tracking_id: id })
            })
            .then(res => res.json())
            .then(data => {
                box.style.display = 'block';
                if(data.status === 'found') {
                    box.className = "result-box alert alert-info";
                    const status = data.data.current_status ?? data.data.Current_Status;
                    const customer = data.data.customer_name ?? data.data.Customer_Name;
                    const cost = data.data.total_cost ?? data.data.Total_Cost;
                    box.innerHTML = `<ul class="list-group"><li class="list-group-item">Status: ${status}</li><li class="list-group-item">User: ${customer}</li><li class="list-group-item">Cost: Rs ${Number(cost).toFixed(2)}</li></ul>`;
                } else {
                    box.className = "result-box alert alert-warning";
                    box.innerHTML = "Tracking ID not found.";
                }
            });
        }
    </script>
</body>
</html>
