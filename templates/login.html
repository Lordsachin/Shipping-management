<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Shipping System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-start: #0f5132;
            --bg-mid: #198754;
            --bg-end: #87d8b1;
            --panel-green-1: #0b3d2c;
            --panel-green-2: #1f6b4b;
            --panel-green-3: #58c894;
            --card-bg: #f8fff9;
            --text-main: #123325;
            --muted: #4d6a5c;
            --input-bg: #e8f7ee;
            --input-border: #c0e8d0;
            --button: #1f8f5f;
            --button-hover: #186f4b;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Manrope', sans-serif;
            background:
                linear-gradient(rgba(8, 33, 20, 0.62), rgba(16, 66, 41, 0.55)),
                url("{{ url_for('static', filename='images/titanic-1.jpg') }}") center/cover no-repeat fixed;
            margin: 0;
            padding: 20px;
        }

        .auth-shell {
            width: 100%;
            max-width: 420px;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 20px 45px rgba(7, 24, 17, 0.35);
            animation: riseIn 0.7s ease both;
        }

        .hero-art {
            height: 215px;
            position: relative;
            background: linear-gradient(160deg, var(--panel-green-1) 0%, var(--panel-green-2) 55%, var(--panel-green-3) 100%);
        }

        .hero-art::before,
        .hero-art::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            background: rgba(230, 255, 240, 0.2);
        }

        .hero-art::before {
            width: 140px;
            height: 140px;
            right: 35px;
            top: 24px;
        }

        .hero-art::after {
            width: 85px;
            height: 85px;
            left: 34px;
            bottom: 20px;
            background: rgba(220, 255, 235, 0.28);
        }

        .wave {
            position: absolute;
            border-radius: 60% 40% 0 0;
            transform: rotate(-4deg);
        }

        .wave.one {
            width: 260px;
            height: 120px;
            background: #0f4d35;
            left: -14px;
            bottom: -34px;
        }

        .wave.two {
            width: 220px;
            height: 110px;
            background: #1d6a48;
            right: -28px;
            bottom: -28px;
            transform: rotate(4deg);
        }

        .login-card {
            background: var(--card-bg);
            padding: 26px 28px 24px;
        }

        .login-title {
            color: var(--text-main);
            margin: 0 0 16px;
            font-size: 1.9rem;
            font-weight: 800;
            letter-spacing: 0.2px;
        }

        .form-control {
            border-radius: 999px;
            padding: 11px 16px;
            border: 1px solid var(--input-border);
            margin-bottom: 14px;
            font-size: 0.95rem;
            background: var(--input-bg);
            color: var(--text-main);
        }

        .form-control:focus {
            border-color: #77d5a7;
            box-shadow: 0 0 0 0.2rem rgba(39, 166, 108, 0.2);
            background: #f1fff6;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #47876b;
            width: 16px;
            height: 16px;
            pointer-events: none;
        }

        .input-wrap .form-control {
            padding-left: 40px;
        }

        .btn-login {
            background-color: var(--button);
            color: white;
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.35px;
            transition: 0.2s ease;
            margin-top: 8px;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-login:hover {
            background-color: var(--button-hover);
            color: white;
        }

        .row-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 2px 0 12px;
            color: var(--muted);
            font-size: 0.76rem;
        }

        .row-meta label,
        .row-meta a {
            color: var(--muted);
            text-decoration: none;
        }

        .row-meta a:hover {
            color: #184e38;
            text-decoration: underline;
        }

        .links {
            text-align: center;
            margin-top: 12px;
            font-size: 0.84rem;
        }

        .links a {
            color: #216f4e;
            text-decoration: none;
            font-weight: 600;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .alert {
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 12px;
        }

        @keyframes riseIn {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            body { padding: 16px; }
            .auth-shell {
                max-width: 100%;
            }
            .hero-art {
                height: 190px;
            }
            .login-card {
                padding: 22px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="auth-shell">
        <div class="hero-art" aria-hidden="true">
            <div class="wave one"></div>
            <div class="wave two"></div>
        </div>

        <div class="login-card">
            <h2 class="login-title">Login</h2>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="alert alert-danger p-2 text-center">{{ messages[0] }}</div>
                {% endif %}
            {% endwith %}

            <form action="/login" method="POST">
                <div class="input-wrap">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/>
                        <path d="M4 20c0-3.2 3.2-5 8-5s8 1.8 8 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <input type="email" name="email" class="form-control" placeholder="Username or Email" required>
                </div>

                <div class="input-wrap">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="4" y="11" width="16" height="9" rx="2" stroke="currentColor" stroke-width="2"/>
                        <path d="M8 11V8a4 4 0 1 1 8 0v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <input type="password" name="password" id="password" class="form-control" placeholder="Password" required>
                </div>

                <div class="row-meta">
                    <label class="d-flex align-items-center gap-1">
                        <input class="form-check-input m-0" type="checkbox" onclick="togglePassword()">
                        show password
                    </label>
                    <a href="#">forgot password</a>
                </div>

                <button type="submit" class="btn btn-login">
                    Login
                </button>
            </form>

            <div class="links">
                <a href="/signup">Create Account</a>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
