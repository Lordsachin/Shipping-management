<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Shipping System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1abc9c; /* The Green Color from your image */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .login-title {
            color: #16a085;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 300;
            font-size: 2rem;
        }
        .form-control {
            border-radius: 4px;
            padding: 12px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
        }
        .btn-login {
            background-color: #16a085;
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            transition: 0.3s;
        }
        .btn-login:hover { background-color: #149174; }
        .links { text-align: center; margin-top: 20px; font-size: 14px; }
        .links a { color: #16a085; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2 class="login-title">Login</h2>
        
        <!-- FLASK FLASH MESSAGES (For Errors) -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert alert-danger p-2 text-center">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <input type="email" name="email" class="form-control" placeholder="Email" required>
            <input type="password" name="password" id="password" class="form-control" placeholder="Password" required>
            
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" onclick="togglePassword()">
                <label class="form-check-label text-muted" style="font-size: 14px;">Show Password</label>
            </div>

            <button type="submit" class="btn btn-login">SIGN IN</button>
        </form>

        <div class="links">
            <p class="mb-1"><a href="#">Forgot Username / Password?</a></p>
            <p>Don't have an account? <a href="/signup">Sign up</a></p>
        </div>
    </div>

    <script>
        function togglePassword() {
            var x = document.getElementById("password");
            if (x.type === "password") { x.type = "text"; } else { x.type = "password"; }
        }
    </script>
</body>
</html>
