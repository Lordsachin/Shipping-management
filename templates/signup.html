<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1abc9c; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        .card { width: 100%; max-width: 400px; padding: 40px; border-radius: 8px; border: none; }
        .btn-green { background-color: #16a085; color: white; width: 100%; padding: 12px; }
        .btn-green:hover { background-color: #149174; color: white; }
    </style>
</head>
<body>
    <div class="card shadow">
        <h2 class="text-center mb-4" style="color: #16a085;">Create Account</h2>
        
        <form action="/signup" method="POST">
            <div class="mb-3">
                <input type="text" name="fullname" class="form-control p-3" placeholder="Full Name" required>
            </div>
            <div class="mb-3">
                <input type="email" name="email" class="form-control p-3" placeholder="Email Address" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control p-3" placeholder="Create Password" required>
            </div>
            <button type="submit" class="btn btn-green">SIGN UP</button>
        </form>
        <div class="text-center mt-3">
            <a href="/login" style="color: #16a085; text-decoration: none;">Already have an account? Login</a>
        </div>
    </div>
</body>
</html>
